<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8">
		<title>Sackgasse</title>
		<link rel="stylesheet" href="css/custom_fonts.css">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="icon" href="favicon.ico" type="image/x-icon">
		<style>
			html, body { height: 100%; margin: 0; }
			body {
				display: flex;
				align-items: center;
				justify-content: center;
				background: #1a171a;
				color: #f2e9ee;
				text-align: center;
				padding: 2rem;
			}
			.sackgasse { max-width: 22rem; }
			.emoji { font-size: 4rem; line-height: 1; }
			h1 {
				margin: 1rem 0 0.5rem;
				color: #910040;
				font-size: 2.5rem;
				letter-spacing: 1px;
			}
			p { margin: 0 0 1.75rem; opacity: 0.8; font-size: 1.1rem; }
			a {
				display: inline-block;
				padding: 0.6rem 1.4rem;
				border: 2px solid #910040;
				border-radius: 6px;
				color: #f2e9ee;
				text-decoration: none;
				transition: background 0.2s, color 0.2s;
			}
			a:hover { background: #910040; color: #fff; }
		</style>
	</head>
	<body>
		<div class="sackgasse">
			<div class="emoji">🚧</div>
			<h1>Sackgasse</h1>
			<p>Sorry, hier geht's leider nicht weiter.</p>
			<a href="index.html">← Zurück zum Menü</a>
		</div>
	</body>
</html>
